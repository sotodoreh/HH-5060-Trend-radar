<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>5060 트렌드 레이더</title>
<style>
  :root{
    --bg:#0f1420; --panel:#181f30; --panel2:#1e2740; --line:#2a3552;
    --text:#e8ecf4; --sub:#93a0bb; --accent:#ff6b57; --up:#ff6b57; --new:#4cc9a7;
    --gold:#f2c14e; --chip:#232e4a; --chip-on:#ff6b57;
    font-size:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    line-height:1.55; padding-bottom:60px;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:0 20px}

  header{padding:34px 0 18px; border-bottom:1px solid var(--line)}
  .brand{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .brand h1{font-size:1.7rem; letter-spacing:-.5px}
  .brand h1 b{color:var(--accent)}
  .brand .target{font-size:.85rem; color:var(--sub); border:1px solid var(--line); padding:3px 10px; border-radius:20px}
  .meta{margin-top:10px; color:var(--sub); font-size:.9rem; display:flex; gap:16px; flex-wrap:wrap}

  .cards{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:22px 0}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px}
  .card .label{color:var(--sub); font-size:.85rem; display:flex; align-items:center}
  .card .num{font-size:2rem; font-weight:800; margin-top:4px}
  .card .num small{font-size:1rem; font-weight:500; color:var(--sub)}
  .card.rising .num{color:var(--up)}
  .card.newkw .num{color:var(--new)}

  .tabs{display:flex; gap:8px; margin:8px 0 18px}
  .tab{flex:1; text-align:center; padding:13px 8px; border-radius:12px; background:var(--panel);
    border:1px solid var(--line); cursor:pointer; font-weight:700; font-size:.98rem; color:var(--sub);
    display:flex; align-items:center; justify-content:center; gap:6px}
  .tab.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .tab .star{font-size:.85rem}

  .chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px}
  .chip{padding:7px 14px; border-radius:20px; background:var(--chip); color:var(--sub); cursor:pointer;
    font-size:.9rem; border:1px solid transparent}
  .chip.on{background:var(--chip-on); color:#fff; font-weight:700}
  .chip.all{border:1px dashed var(--line)}
  .chip.all.on{border-style:solid}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .grid2.single{grid-template-columns:1fr}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:14px}
  .panel h2{font-size:1.02rem; padding:14px 18px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px}
  .panel h2 .hint{font-size:.8rem; color:var(--sub); font-weight:400; margin-left:auto}
  .panel .body{overflow-x:auto}

  table{width:100%; border-collapse:collapse}
  th{font-size:.78rem; color:var(--sub); text-align:left; padding:10px 18px; font-weight:500; border-bottom:1px solid var(--line)}
  td{padding:11px 18px; border-bottom:1px solid #202a44; font-size:.95rem}
  tr:last-child td{border-bottom:none}
  td.rk{width:52px; color:var(--sub); font-variant-numeric:tabular-nums}
  td.kw{font-weight:600}
  .badge{display:inline-block; padding:2px 9px; border-radius:11px; font-size:.78rem; font-weight:700}
  .badge.up{background:rgba(255,107,87,.15); color:var(--up)}
  .badge.new{background:rgba(76,201,167,.15); color:var(--new)}
  .badge.flat{color:var(--sub); font-weight:400}
  .badge.src{background:var(--chip); color:var(--sub); font-weight:400}
  .badge.gap{background:rgba(242,193,78,.15); color:var(--gold)}

  .empty-track{padding:40px 20px; text-align:center; color:var(--sub); font-size:.95rem; line-height:1.7}
  .placeholder{display:flex; align-items:center; justify-content:center; min-height:200px;
    color:var(--sub); font-size:.92rem; border:1px dashed var(--line); border-radius:14px; text-align:center; padding:20px}

  /* AI 인사이트 탭 — 이 페이지의 핵심 */
  .ins-hero{background:linear-gradient(160deg,var(--panel2),var(--panel));
    border:1px solid var(--line); border-radius:16px; padding:26px 26px 22px}
  .ins-hero .eyebrow{color:var(--accent); font-size:.82rem; font-weight:700; letter-spacing:.5px}
  .ins-hero h2{font-size:1.35rem; margin:6px 0 14px; display:flex; align-items:center; gap:8px}
  .ins-hero .summary{color:var(--text); font-size:1.02rem; line-height:1.7; white-space:pre-line}
  .cands{margin-top:18px; display:grid; gap:12px}
  .cand{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 18px}
  .cand .head{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:6px}
  .cand .rank-no{width:26px; height:26px; border-radius:50%; background:var(--accent); color:#fff;
    display:inline-flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:800; flex:0 0 auto}
  .cand .name{font-weight:800; font-size:1.05rem}
  .cand .cat{color:var(--sub); font-size:.83rem}
  .cand .reason{color:var(--sub); font-size:.94rem; padding-left:36px; line-height:1.6}
  .ins-empty{padding:48px 24px; text-align:center; color:var(--sub); line-height:1.8}
  .ins-empty .big{font-size:2rem; margin-bottom:8px}

  /* Hype 상품 레이더 — 관심사 탭과 같은 패널 골격에 카드 그리드 */
  .hp-section{margin-bottom:16px}
  .hp-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:14px 16px}
  .hp-card{background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:13px 15px; min-width:0}
  .hp-head{display:flex; align-items:center; gap:9px; flex-wrap:wrap; padding-bottom:9px; border-bottom:1px solid var(--line); margin-bottom:9px}
  .hp-rank{width:24px; height:24px; border-radius:7px; background:var(--chip); color:var(--sub);
    display:inline-flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:800; flex:0 0 auto}
  .hp-kw{font-weight:800; font-size:1.02rem}
  .hp-head .cat{color:var(--sub); font-size:.8rem}
  .hp-prods{display:grid; gap:7px}
  .hp-prod{display:flex; flex-direction:column; gap:2px; padding:7px 10px; background:var(--bg); border-radius:9px; min-width:0}
  .hp-ptitle{font-size:.88rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .hp-pmeta{font-size:.8rem; color:var(--sub); display:flex; align-items:center; gap:8px; flex-wrap:wrap}

  /* info 툴팁 트리거 */
  .info{display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px;
    border-radius:50%; background:var(--chip); color:var(--sub); font-size:11px; font-weight:800;
    cursor:help; border:1px solid var(--line); user-select:none; flex:0 0 auto}
  .info:hover,.info:focus{background:var(--accent); color:#fff; outline:none}
  #tip{position:fixed; z-index:9999; max-width:280px; background:#0a0e18; color:var(--text);
    border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:12.5px; font-weight:400;
    line-height:1.55; box-shadow:0 10px 30px rgba(0,0,0,.5); opacity:0; visibility:hidden;
    transition:opacity .13s; pointer-events:none}
  #tip.on{opacity:1; visibility:visible}

  footer{margin-top:36px; color:#5b6784; font-size:.8rem; text-align:center; line-height:1.7}

  @media (max-width:720px){
    .cards{grid-template-columns:1fr 1fr 1fr; gap:8px}
    .card{padding:12px}
    .card .num{font-size:1.4rem}
    .grid2{grid-template-columns:1fr}
    .hp-grid{grid-template-columns:1fr}
    .brand h1{font-size:1.35rem}
    td,th{padding:9px 12px}
    .tab{font-size:.85rem; padding:11px 4px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>5060 <b>트렌드 레이더</b></h1>
      <span class="target">타깃 · 50–60대 여성</span>
    </div>
    <div class="meta" id="meta">데이터 로딩 중…</div>
  </header>

  <section class="cards" id="cards"></section>

  <nav class="tabs">
    <div class="tab on" data-tab="interest">관심사 레이더</div>
    <div class="tab" data-tab="hype">Hype 상품 레이더</div>
    <div class="tab" data-tab="insight"><span class="star">★</span> AI 인사이트</div>
  </nav>

  <!-- 관심사 레이더 -->
  <div id="view-interest">
    <div class="chips" id="chips"></div>
    <div class="grid2" id="interest-grid">
      <div class="panel">
        <h2>
          급상승 · 신규 진입
          <span class="info" tabindex="0" data-tip="매주 데이터랩 쇼핑인사이트에서 50~60대 여성 인기검색어 TOP500을 수집해 전주와 비교합니다. ▲숫자 = 순위 상승 폭(30계단 이상), NEW = 신규 진입(100위 이내만 노출). 검색량 절대값이 제공되지 않는 한계를 보완하기 위해 현재 300위 밖 롱테일은 목록에서 제외합니다. '전체'는 전 카테고리 통합, 개별 카테고리는 해당 카테고리만.">?</span>
          <span class="hint" id="rising-scope">전체</span>
        </h2>
        <div class="body" id="rising-wrap"></div>
      </div>
      <div class="panel" id="kw-panel">
        <h2 id="kw-title">
          인기검색어
          <span class="info" tabindex="0" data-tip="네이버 데이터랩 쇼핑인사이트 · 50~60대 여성 필터 · 최근 4주 주간 기준 인기검색어를 순위대로 나열합니다. ▲/NEW 배지는 전주 대비 변화입니다.">?</span>
        </h2>
        <div class="body" id="kw-wrap"></div>
      </div>
    </div>
  </div>

  <!-- Hype 상품 레이더 -->
  <div id="view-hype" style="display:none">
    <div id="hype-body"></div>
  </div>

  <!-- AI 인사이트 (핵심) -->
  <div id="view-insight" style="display:none">
    <div class="ins-hero">
      <div class="eyebrow">이 주의 소싱 시그널</div>
      <h2>
        방송상품화 후보
        <span class="info" tabindex="0" data-tip="관심사 급상승(트랙1) × 관련 상품 hype(트랙2) × 현대홈쇼핑 방송 미보유(Hmall 체크)의 교차점을 Claude가 분석해 방송상품화 후보를 도출합니다. 계절성·홈쇼핑 적합성(시연 가능성/객단가/5060 소구력)·미보유 갭을 종합해 우선순위를 매깁니다. 미보유 갭이 클수록 소싱 1순위입니다.">?</span>
      </h2>
      <div class="summary" id="ins-summary"></div>
    </div>
    <div class="cands" id="ins-cands"></div>
  </div>

  <footer>
    5060 트렌드 레이더 · 네이버 데이터랩 쇼핑인사이트 기반 · 매주 월요일 자동 갱신<br>
    관심사 급상승 × 상품 hype × 당사 방송 미보유 교차점 = 최상위 소싱 후보
  </footer>
</div>

<div id="tip"></div>

<script>
const $ = s => document.querySelector(s);
let DATA = null, curCat = "전체";

function deltaBadge(r){
  if (r.is_new) return '<span class="badge new">NEW</span>';
  if (r.delta == null) return '<span class="badge flat">–</span>';
  if (r.delta > 0) return `<span class="badge up">▲${r.delta}</span>`;
  if (r.delta < 0) return `<span class="badge flat">▽${-r.delta}</span>`;
  return '<span class="badge flat">–</span>';
}

function renderMeta(){
  const m = DATA.meta;
  $('#meta').innerHTML = [
    `기준 주차 <b>${m.week}</b>`,
    `조회 구간 ${m.period}`,
    m.prev_week ? `비교 대상 ${m.prev_week}` : '첫 수집 주',
  ].join(' · ');
}

function renderCards(){
  const s = DATA.stats;
  $('#cards').innerHTML = `
    <div class="card rising"><div class="label">급상승 키워드
      <span class="info" tabindex="0" data-tip="현재 300위 이내이면서 지난주보다 순위가 30계단 이상 오른 키워드 수입니다. 데이터랩은 절대 검색량을 제공하지 않아, 300위 밖 롱테일(검색량 미미 추정)은 집계에서 제외해 유의미한 시그널만 셉니다. 수집·비교 모수는 TOP500입니다.">?</span></div>
      <div class="num">${s.rising_count ?? 0}<small>개</small></div></div>
    <div class="card newkw"><div class="label">TOP300 신규 진입
      <span class="info" tabindex="0" data-tip="지난주 TOP500에는 없었는데 이번주 300위 이내로 진입한 키워드 수입니다. 관심사의 판이 얼마나 바뀌었는지 보여주는 지표로, 300위 밖 진입은 노이즈로 보고 제외합니다.">?</span></div>
      <div class="num">${s.new_count ?? 0}<small>개</small></div></div>
    <div class="card"><div class="label">Hmall 미보유 갭
      <span class="info" tabindex="0" data-tip="급등 상품 중 현대홈쇼핑이 아직 방송상품으로 보유하지 않은 건수입니다. 트랙2·Hmall 검색 연동 후 집계되며, 미보유 갭이 소싱 1순위 신호입니다.">?</span></div>
      <div class="num">${s.gap_count ?? '–'}<small>${s.gap_count!=null?'개':' 준비중'}</small></div></div>`;
  initTips();
}

function renderChips(){
  const cats = ['전체', ...DATA.categories];
  $('#chips').innerHTML = cats.map(c =>
    `<span class="chip ${c==='전체'?'all':''} ${c===curCat?'on':''}" data-cat="${c}">${c}</span>`).join('');
  document.querySelectorAll('.chip').forEach(el =>
    el.onclick = () => { curCat = el.dataset.cat; renderInterest(); });
}

function risingTable(rows, showCat){
  if (!rows || !rows.length){
    return '<div class="empty-track">전주 데이터가 쌓이면 급상승 감지가 시작됩니다.<br>해당 카테고리에 급상승·신규가 없습니다.</div>';
  }
  const head = showCat
    ? '<tr><th>순위</th><th>키워드</th><th>카테고리</th><th>변화</th></tr>'
    : '<tr><th>순위</th><th>키워드</th><th>변화</th></tr>';
  const body = rows.slice(0, showCat ? 24 : 30).map(r => showCat
    ? `<tr><td class="rk">${r.rank}</td><td class="kw">${r.keyword}</td><td><span class="badge src">${r.category}</span></td><td>${deltaBadge(r)}</td></tr>`
    : `<tr><td class="rk">${r.rank}</td><td class="kw">${r.keyword}</td><td>${deltaBadge(r)}</td></tr>`
  ).join('');
  return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

function keywordTable(cat){
  const rows = (DATA.keywords[cat] || []).slice(0, 30);
  if (!rows.length) return '<div class="empty-track">데이터 없음</div>';
  const body = rows.map(r =>
    `<tr><td class="rk">${r.rank}</td><td class="kw">${r.keyword}${r.source?` <span class="badge src">${r.source}</span>`:''}</td><td>${deltaBadge(r)}</td></tr>`).join('');
  return `<table><thead><tr><th>순위</th><th>키워드</th><th>변화</th></tr></thead><tbody>${body}</tbody></table>`;
}

function renderInterest(){
  renderChips();
  const grid = $('#interest-grid'), kwPanel = $('#kw-panel');
  if (curCat === '전체'){
    // 전체: 왼쪽에 통합 급상승/신규만, 오른쪽 비움
    grid.classList.add('single');
    kwPanel.style.display = 'none';
    $('#rising-scope').textContent = '전 카테고리 통합';
    $('#rising-wrap').innerHTML = risingTable(DATA.rising, true);
  } else {
    // 개별 카테고리: 왼쪽 해당 카테 급상승/신규 + 오른쪽 인기검색어
    grid.classList.remove('single');
    kwPanel.style.display = '';
    $('#rising-scope').textContent = curCat;
    $('#rising-wrap').innerHTML = risingTable((DATA.rising_by_cat||{})[curCat], false);
    $('#kw-title').innerHTML = `${curCat} 인기검색어 <span class="info" tabindex="0" data-tip="네이버 데이터랩 쇼핑인사이트 · 50~60대 여성 · 최근 4주 주간 기준 인기검색어 순위입니다. 데이터랩 특성상 절대 검색량은 제공되지 않아 순위로 상대적 관심도를 봅니다.">?</span> <span class="hint">상위 30</span>`;
    $('#kw-wrap').innerHTML = keywordTable(curCat);
  }
  initTips();
}

function fluctBadge(it){
  const f = it.rank_fluctuation, s = it.status;
  if (s === 'NEW' || s === 'NEW_ENTRY') return '<span class="badge new">NEW</span>';
  if (f > 0) return `<span class="badge up">▲${f}</span>`;
  if (f < 0) return `<span class="badge flat">▽${-f}</span>`;
  return '<span class="badge flat">–</span>';
}
function won(v){ return v ? v : '–'; }

const HYPE_SECTIONS = [
  { key:'이슈', title:'구매 급상승 (이슈)',
    tip:'이번 주 실제 구매가 급상승한 키워드입니다. 검색(관심사 레이더)이 아닌 구매 기준의 별도 신호로, ▲/▽는 전주 대비 구매 순위 변동입니다.' },
  { key:'신규', title:'베스트 신규 진입',
    tip:'이번 주 처음 구매 베스트에 진입한 키워드입니다. 새로 열리는 수요를 포착합니다.' },
  { key:'인기', title:'꾸준 인기 (스테디)',
    tip:'주간 구매 상위를 꾸준히 지키는 키워드입니다. 검증된 수요의 기준선 역할을 합니다.' },
];

function renderHype(){
  const hype = DATA.hype || {};
  const has = HYPE_SECTIONS.some(s => (hype[s.key]||[]).length);
  if (!has){
    $('#hype-body').innerHTML = `<div class="panel"><div class="empty-track">
      네이버쇼핑 베스트(5060 여성) 데이터가 아직 없습니다.<br>다음 자동 수집부터 채워집니다.</div></div>`;
    return;
  }
  const src = ' · 네이버쇼핑 베스트 · 50대 이상 여성 · 실구매 기준';
  $('#hype-body').innerHTML = HYPE_SECTIONS.map(sec => {
    const items = hype[sec.key] || [];
    if (!items.length) return '';
    const cards = items.map(it => {
      const prods = (it.products||[]).map(p => `
        <div class="hp-prod">
          <span class="hp-ptitle" title="${(p.title||'').replace(/"/g,'&quot;')}">${p.title||''}</span>
          <span class="hp-pmeta">${won(p.price)}원 · 리뷰 ${p.review_count!=null?p.review_count.toLocaleString():'–'} <span class="badge gap hp-hmall">Hmall 확인예정</span></span>
        </div>`).join('');
      return `
        <div class="hp-card">
          <div class="hp-head">
            <span class="hp-rank">${it.rank}</span>
            <span class="hp-kw">${it.keyword}</span>
            <span class="cat">${it.category||''}</span>
            ${fluctBadge(it)}
          </div>
          <div class="hp-prods">${prods || '<span class="hp-pmeta">상품 없음</span>'}</div>
        </div>`;
    }).join('');
    return `
      <div class="panel hp-section">
        <h2>${sec.title}
          <span class="info" tabindex="0" data-tip="${sec.tip}">?</span>
          <span class="hint">${sec.key} TOP ${items.length}${src}</span>
        </h2>
        <div class="hp-grid">${cards}</div>
      </div>`;
  }).join('');
  initTips();
}

function renderInsight(){
  const ins = DATA.insights || {};
  if (!ins.generated || !(ins.candidates||[]).length){
    $('#ins-summary').innerHTML = '';
    $('#ins-cands').innerHTML = `<div class="ins-empty"><div class="big">🧠</div>
      AI 인사이트는 매주 자동 생성됩니다.<br>ANTHROPIC_API_KEY 설정 후 다음 실행부터 이 곳에 방송상품화 후보가 채워집니다.</div>`;
    return;
  }
  $('#ins-summary').textContent = ins.summary || '';
  $('#ins-cands').innerHTML = (ins.candidates||[]).map((c,i) => `
    <div class="cand">
      <div class="head">
        <span class="rank-no">${i+1}</span>
        <span class="name">${c.name}</span>
        <span class="cat">${c.category}</span>
        <span class="badge ${c.hmall_status==='방송상품 미보유'?'gap':'src'}">${c.hmall_status}</span>
      </div>
      <div class="reason">${c.reason}</div>
    </div>`).join('');
}

// 탭 전환
document.querySelectorAll('.tab').forEach(el => el.onclick = () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  const t = el.dataset.tab;
  $('#view-interest').style.display = t==='interest' ? '' : 'none';
  $('#view-hype').style.display     = t==='hype'     ? '' : 'none';
  $('#view-insight').style.display  = t==='insight'  ? '' : 'none';
});

// 플로팅 툴팁 (부모 overflow에 잘리지 않도록 body 기준 fixed 위치)
const tip = $('#tip');
function showTip(e){
  const el = e.currentTarget;
  tip.textContent = el.getAttribute('data-tip');
  tip.classList.add('on');
  const r = el.getBoundingClientRect();
  const tw = Math.min(280, tip.offsetWidth);
  let left = r.left + r.width/2 - tw/2;
  left = Math.max(10, Math.min(left, window.innerWidth - tw - 10));
  let top = r.bottom + 8;
  if (top + tip.offsetHeight > window.innerHeight - 10) top = r.top - tip.offsetHeight - 8;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
}
function hideTip(){ tip.classList.remove('on'); }
function initTips(){
  document.querySelectorAll('.info[data-tip]').forEach(el => {
    if (el._tip) return; el._tip = 1;
    el.addEventListener('mouseenter', showTip);
    el.addEventListener('mouseleave', hideTip);
    el.addEventListener('focus', showTip);
    el.addEventListener('blur', hideTip);
    el.addEventListener('click', e => { showTip(e); });
  });
}

fetch('data/latest.json?v=' + Date.now())
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(d => {
    DATA = d;
    renderMeta(); renderCards(); renderInterest(); renderHype(); renderInsight();
    initTips();
  })
  .catch(e => { $('#meta').innerHTML = `데이터를 불러오지 못했습니다 (${e.message}).`; });
</script>
</body>
</html>
