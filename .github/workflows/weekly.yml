name: weekly-trend-radar

on:
  schedule:
    # 매주 월요일 오전(KST) — 23:40 UTC(월 08:40 KST 부근). 정각(00 UTC)은
    # GitHub 스케줄러 혼잡으로 수시간 지연되므로 정각을 피한 분(分)으로 설정.
    - cron: "40 23 * * 0"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_pipeline.py

      - name: Commit & push data
        run: |
          git config user.name "trend-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs/data
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋/푸시 건너뜀"
            exit 0
          fi
          git commit -m "chore: weekly data $(date +'%Y-%m-%d')"
          # 원격이 앞서 있을 수 있으므로(코드 수정 푸시·동시 실행 경합) rebase 후 재시도
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            echo "push 재시도 $attempt..."
            sleep 5
          done
          echo "push 최종 실패" && exit 1
